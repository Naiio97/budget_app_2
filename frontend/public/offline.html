<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Budget Tracker – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #0d1b2a 100%);
      background-attachment: fixed;
      color: rgba(255, 255, 255, 0.95);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .offline-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .offline-icon {
      font-size: 4rem;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    p {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
      min-height: 48px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-retry:hover {
      box-shadow: 0 6px 24px rgba(0, 122, 255, 0.4);
      transform: scale(1.02);
    }

    .btn-retry:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <span class="offline-icon">📡</span>
    <h1>Jste offline</h1>
    <p>Zdá se, že nemáte připojení k internetu. Zkontrolujte své připojení a zkuste to znovu.</p>
    <button class="btn-retry" onclick="window.location.reload()">
      🔄 Zkusit znovu
    </button>
  </div>
</body>
</html>
