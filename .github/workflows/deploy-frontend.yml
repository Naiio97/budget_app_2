name: Deploy Frontend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch: # Přidá tlačítko pro manuální spuštění v GitHubu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linting (ESLint)
        run: |
          cd frontend
          # Tohle ověří, že v JS/TS nemáš boty, než začneš buildovat
          npm run lint

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          # DŮLEŽITÉ: Tady předáváme adresu backendu do frontendu při buildu
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://budget-api.azurecontainerapps.io \
            -t ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-frontend:${{ github.sha }} \
            ./frontend
          
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-frontend:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: budget-frontend
          resourceGroup: budget-app-rg
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-frontend:${{ github.sha }}