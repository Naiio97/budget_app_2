name: Deploy Backend to Azure

on:
  push:
    branches:
      - main   # Spustí se jen při pushi do main
#   paths:
      - 'backend/**' # Spustí se jen když změníš něco v backendu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- TADY JE TEN TEST ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8  # Tenhle nástroj zkontroluje chyby v kódu

      - name: Run Linting (Simple Test)
        run: |
          cd backend
          # Zkontroluje jen syntaktické chyby, ignoruje "estetiku"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics  

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-backend:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: budget-api
          resourceGroup: budget-app-rg
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_SERVER }}/budget-backend:${{ github.sha }}