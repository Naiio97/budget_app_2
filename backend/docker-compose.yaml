services:
  db:
    image: postgres:18-alpine   # musí odpovídat live (Azure PG 18) kvůli pg_dump/restore
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      # PG18 ukládá data do /var/lib/postgresql (ne .../data jako PG≤17)
      - postgres_data:/var/lib/postgresql

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s # Jak často se ptát
      timeout: 5s # Jak dlouho čekat na odpověď
      retries: 3 # Kolikrát to zkusit, než vyhlásíš poplach
      start_period: 15s # Kolik vteřin ignorovat chyby po startu (než naběhne DB)


volumes:
  postgres_data:
