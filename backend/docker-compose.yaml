services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: . - 8000:8000
    env_file:
      - .env
    volumes:
      - ./budget.db:/app/budget.db
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s # Jak často se ptát
      timeout: 5s # Jak dlouho čekat na odpověď
      retries: 3 # Kolikrát to zkusit, než vyhlásíš poplach
      start_period: 15s # Kolik vteřin ignorovat chyby po startu (než naběhne DB)  


volumes:
  postgres_data:
